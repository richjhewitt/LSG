<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Locomotive Schedule Generator</title>

<style>
body {
  font-family: sans-serif;
  background: #1e1f22;
  color: #fff;
  padding: 20px;
  margin: 0;
}

h2 {
  margin-bottom: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  background: #2b2d31;
  color: #fff;
  border: 1px solid #444;
  border-radius: 6px;
}

textarea {
  min-height: 100px;
}

button {
  padding: 10px 14px;
  background: #5865f2;
  border: none;
  color: white;
  cursor: pointer;
  margin: 5px 5px 10px 0;
  border-radius: 6px;
}

button.danger {
  background: #ed4245;
}

.row {
  display: grid;
  grid-template-columns: 1fr 120px 40px;
  gap: 10px;
  margin-bottom: 6px;
}

.row input[type="time"] {
  width: 100%;
}

.output {
  white-space: pre-wrap;
  background: #2b2d31;
  padding: 10px;
  border: 1px solid #444;
  border-radius: 6px;
  margin-top: 10px;
}

.section {
  margin-top: 30px;
}

.checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* 📱 Mobile */
@media (max-width: 600px) {
  .row {
    grid-template-columns: 1fr 100px 40px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>🚂 Locomotive Schedule Generator</h2>

<label>Event Name</label>
<input id="eventName" value="DnB Locomotive">

<label>Start Date</label>
<input id="startDate" type="date">

<label>Input Timezone</label>
<select id="timezone">
<option value="auto">Local (Auto)</option>
<option value="Europe/London">UK</option>
<option value="Europe/Paris">EU</option>
<option value="Australia/Brisbane">AUS</option>
<option value="America/New_York">US East</option>
<option value="America/Chicago">US Central</option>
<option value="America/Denver">US Mountain</option>
<option value="America/Los_Angeles">US Pacific</option>
</select>

<label>Paste Schedule</label>
<textarea id="pasteBox"></textarea>

<div id="schedule"></div>

<button onclick="addRow()">+ Add Row</button>

<div class="section">
<h3>Hammertime Output</h3>
<button onclick="generateHammertime()">Generate</button>
<button onclick="copyHammertime()">Copy</button>
<div id="output" class="output"></div>
</div>

<div class="section">
<h3>Chatbot Strings</h3>

<div class="checkbox-group">
<label><input type="checkbox" checked value="Europe/London"> UK</label>
<label><input type="checkbox" checked value="Europe/Paris"> EU</label>
<label><input type="checkbox" checked value="Australia/Brisbane"> AUS</label>
<label><input type="checkbox" checked value="America/New_York"> US East</label>
<label><input type="checkbox" checked value="America/Chicago"> US Central</label>
<label><input type="checkbox" checked value="America/Denver"> US Mountain</label>
<label><input type="checkbox" checked value="America/Los_Angeles"> US Pacific</label>
</div>

<button onclick="generateBot()">Generate</button>
<button onclick="copyBot()">Copy</button>

<div id="botOutput" class="output"></div>
</div>

</div>

<script>

const container = document.getElementById("schedule");
const pasteBox = document.getElementById("pasteBox");

// ---------- NORMALISE ----------
function normaliseTime(t){
  if(!t) return "";
  t = t.trim().toLowerCase().replace(/\s+/g,"");

  // 24h
  if(t.includes(":") && !t.includes("am") && !t.includes("pm")){
    let [h,m] = t.split(":").map(Number);
    if(isNaN(h)||isNaN(m)) return "";
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }

  // am/pm with minutes
  let m = t.match(/^(\d+)(?::(\d+))?(am|pm)$/);
  if(m){
    let h = parseInt(m[1]);
    let min = parseInt(m[2] || "0");

    if(m[3]==="pm" && h!==12) h+=12;
    if(m[3]==="am" && h===12) h=0;

    return String(h).padStart(2,"0")+":"+String(min).padStart(2,"0");
  }

  return "";
}

// ---------- ROW ----------
function addRow(name="", time=""){
  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input value="${name}">
    <input type="time" value="${normaliseTime(time)}">
    <button class="danger">✕</button>
  `;

  row.querySelector("button").onclick = () => row.remove();

  container.appendChild(row);
}

// ---------- PARSER ----------
pasteBox.addEventListener("input", () => {
  const text = pasteBox.value.trim();
  if(!text) return;

  const lines = text.split("\n");
  container.innerHTML = "";

  lines.forEach(line => {
    const parts = line.trim().split(/\s+/).filter(Boolean);

    if(parts.length === 1){
      addRow(parts[0], "");
      return;
    }

    if(parts.length >= 2){
      const name = parts[0];
      const time = parts[parts.length-1];
      const norm = normaliseTime(time);

      if(norm){
        addRow(name, norm);
      }
    }
  });
});

// ---------- GET ROWS ----------
function getRows(){
  const rows = [];
  document.querySelectorAll(".row").forEach(r=>{
    const name = r.children[0].value.trim();
    const time = r.children[1].value;
    if(!name || !time) return;

    const [h,m] = time.split(":").map(Number);
    rows.push({name,h,m});
  });
  return rows;
}

// ---------- TIMEZONE ----------
function getOffsetMs(tz, date){
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: tz,
    hour12: false,
    year:"numeric",month:"2-digit",day:"2-digit",
    hour:"2-digit",minute:"2-digit",second:"2-digit"
  }).formatToParts(date);

  const v={}; parts.forEach(p=>v[p.type]=p.value);

  const asUTC = Date.UTC(v.year,v.month-1,v.day,v.hour,v.minute,v.second);
  return asUTC - date.getTime();
}

function makeUTCDate(y,m,d,h,min,tz){
  if(tz==="auto") return new Date(y,m-1,d,h,min);

  const guess = new Date(Date.UTC(y,m-1,d,h,min));
  const offset = getOffsetMs(tz, guess);
  return new Date(guess.getTime() - offset);
}

function getTimeParts(date,tz){
  const parts = new Intl.DateTimeFormat("en-GB",{
    timeZone:tz,
    hour:"2-digit",minute:"2-digit",hour12:false
  }).formatToParts(date);

  let h=0,m=0;
  parts.forEach(p=>{
    if(p.type==="hour") h=parseInt(p.value);
    if(p.type==="minute") m=parseInt(p.value);
  });
  return {h,m};
}

function formatTime(h,m,tz){
  if(tz.startsWith("America")){
    let suffix = h>=12?"pm":"am";
    let hr = h%12 || 12;
    return m===0 ? `${hr}${suffix}` : `${hr}:${String(m).padStart(2,"0")}${suffix}`;
  }
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function getLabel(tz,date){
  const str = new Intl.DateTimeFormat("en-GB",{timeZone:tz,timeZoneName:"shortOffset"}).format(date);
  if(tz==="Europe/London") return str.includes("+1")?"BST":"GMT";
  if(tz==="Europe/Paris") return str.includes("+2")?"CEST":"CET";
  if(tz==="Australia/Brisbane") return "AEST";
  if(tz==="America/New_York") return str.includes("-4")?"EDT":"EST";
  if(tz==="America/Chicago") return str.includes("-5")?"CDT":"CST";
  if(tz==="America/Denver") return str.includes("-6")?"MDT":"MST";
  if(tz==="America/Los_Angeles") return str.includes("-7")?"PDT":"PST";
}

// ---------- HAMMERTIME ----------
function generateHammertime(){
  const name = eventName.value;
  const date = startDate.value;
  const tz = timezone.value;
  const rows = getRows();

  let [y,m,d]=date.split("-").map(Number);
  let prev=null, offset=0, out="", first=null;

  rows.forEach(r=>{
    if(prev!==null && r.h < prev) offset++;
    prev=r.h;

    const dt = makeUTCDate(y,m,d+offset,r.h,r.m,tz);
    const unix = Math.floor(dt/1000);

    if(!first) first=unix;

    out += `> [${r.name}](https://twitch.tv/${r.name}) - <t:${unix}:t>\n`;
  });

  output.textContent = `🚂 ${name} - <t:${first}:R>\n` + out.trim();
}

// ---------- BOT ----------
function generateBot(){
  const name = eventName.value;
  const date = startDate.value;
  const tz = timezone.value;
  const rows = getRows();

  let [y,m,d]=date.split("-").map(Number);
  const eventDate = new Date(y,m-1,d);

  let regions=[];
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(c=>regions.push(c.value));

  let out="";

  regions.forEach(region=>{
    let line = `🚂 ${name} (${getLabel(region,eventDate)}):`;

    rows.forEach(r=>{
      const dt = makeUTCDate(y,m,d,r.h,r.m,tz);
      const {h,m:mi} = getTimeParts(dt, region);
      line += ` 🚃 ${formatTime(h,mi,region)} @${r.name}`;
    });

    out += "`"+line+"`\n\n";
  });

  botOutput.textContent = out.trim();
}

function copyBot(){ navigator.clipboard.writeText(botOutput.textContent); }
function copyHammertime(){ navigator.clipboard.writeText(output.textContent); }

</script>

</body>
</html>
