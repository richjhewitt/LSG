<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Locomotive Scheduler</title>

<style>
body { font-family:sans-serif; background:#1e1f22; color:#fff; padding:20px }
input, textarea, select {
  width:100%; padding:8px; margin-bottom:10px;
  background:#2b2d31; color:#fff; border:1px solid #444
}
button {
  padding:10px; background:#5865f2;
  border:none; color:white; cursor:pointer; margin-right:10px
}
.section { margin-bottom:30px }
.output {
  white-space:pre-wrap;
  background:#2b2d31;
  padding:10px;
  border:1px solid #444;
  margin-top:10px
}
</style>
</head>

<body>

<h2>🚂 Locomotive Scheduler</h2>

<label>Event Name</label>
<input id="eventName" value="DnB Locomotive">

<label>Start Date</label>
<input id="startDate" type="date">

<label>Input Timezone</label>
<select id="timezone">
<option value="auto">Local (Auto)</option>
<option value="Europe/London">UK (BST / GMT)</option>
<option value="Europe/Paris">EU (CEST / CET)</option>
<option value="Australia/Brisbane">AUS (AEST)</option>
<option value="America/New_York">US East (EDT / EST)</option>
<option value="America/Chicago">US Central (CDT / CST)</option>
<option value="America/Denver">US Mountain (MDT / MST)</option>
<option value="America/Los_Angeles">US Pacific (PDT / PST)</option>
</select>

<label>Paste Schedule</label>
<textarea id="pasteBox"></textarea>

<table id="schedule"><tbody></tbody></table>
<button onclick="addRow()">+ Add Row</button>

<div class="section">
<h3>Hammertime Output</h3>
<button onclick="generateHammertime()">Generate</button>
<button onclick="copyHammertime()">Copy</button>
<div id="output" class="output"></div>
</div>

<div class="section">
<h3>Chatbot Strings</h3>

<div>
<label><input type="checkbox" checked value="Europe/London"> UK</label>
<label><input type="checkbox" checked value="Europe/Paris"> EU</label>
<label><input type="checkbox" checked value="Australia/Brisbane"> AUS</label>
<label><input type="checkbox" checked value="America/New_York"> US East</label>
<label><input type="checkbox" checked value="America/Chicago"> US Central</label>
<label><input type="checkbox" checked value="America/Denver"> US Mountain</label>
<label><input type="checkbox" checked value="America/Los_Angeles"> US Pacific</label>
</div>

<button onclick="generateBot()">Generate</button>
<button onclick="copyBot()">Copy</button>

<div id="botOutput" class="output"></div>
</div>

<script>

const tbody = document.querySelector("#schedule tbody");
const pasteBox = document.getElementById("pasteBox");

// 🔥 ALWAYS normalise BEFORE inserting
function normaliseTime(t){
  if(!t) return "";

  t = t.trim().toLowerCase();

  // handle "6 pm"
  t = t.replace(/\s+/g, "");

  if(t.includes(":")){
    let [h,m] = t.split(":").map(Number);
    if(isNaN(h) || isNaN(m)) return "";
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }

  let m = t.match(/^(\d+)(am|pm)$/);
  if(m){
    let h = parseInt(m[1]);
    if(m[2]==="pm" && h!==12) h+=12;
    if(m[2]==="am" && h===12) h=0;
    return String(h).padStart(2,"0")+":00";
  }

  return "";
}

function addRow(name="", time=""){
  const row = document.createElement("tr");
  row.innerHTML = `
    <td><input value="${name}"></td>
    <td><input type="time" value="${normaliseTime(time)}"></td>
  `;
  tbody.appendChild(row);
}

// ✅ robust paste (kept simple + reliable)
pasteBox.addEventListener("input", () => {
  const text = pasteBox.value.trim();
  if(!text) return;

  const rows = [];

  text.split("\n").forEach(line => {
    const parts = line.trim().split(/\s+/).filter(Boolean);
    if(parts.length >= 2){
      rows.push({
        name: parts[0],
        time: parts[parts.length - 1]
      });
    }
  });

  if(rows.length === 0) return;

  tbody.innerHTML = "";
  rows.forEach(r => addRow(r.name, r.time));
});

function parseTime(t){
  const norm = normaliseTime(t);
  if(!norm) return null;
  const [h,m] = norm.split(":").map(Number);
  return [h,m];
}

function getRows(){
  let rows=[];
  document.querySelectorAll("#schedule tr").forEach(r=>{
    const name = r.children[0].querySelector("input").value.trim();
    const time = r.children[1].querySelector("input").value;
    if(!name || !time) return;
    const parsed = parseTime(time);
    if(parsed) rows.push({name, h:parsed[0], m:parsed[1]});
  });
  return rows;
}

// ---------- timezone logic (unchanged, working) ----------

function getOffsetMs(tz, date){
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: tz,
    hour12: false,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  }).formatToParts(date);

  const vals = {};
  parts.forEach(p => vals[p.type] = p.value);

  const asUTC = Date.UTC(
    vals.year,
    vals.month - 1,
    vals.day,
    vals.hour,
    vals.minute,
    vals.second
  );

  return asUTC - date.getTime();
}

function makeUTCDate(year, month, day, hour, minute, tz){
  if(tz === "auto"){
    return new Date(year, month-1, day, hour, minute);
  }

  const utcGuess = new Date(Date.UTC(year, month-1, day, hour, minute));
  const offset = getOffsetMs(tz, utcGuess);

  return new Date(utcGuess.getTime() - offset);
}

function getLabel(tz, date){
  const str = new Intl.DateTimeFormat("en-GB", {
    timeZone: tz,
    timeZoneName: "shortOffset"
  }).format(date);

  if(tz==="Europe/London") return str.includes("+1") ? "BST" : "GMT";
  if(tz==="Europe/Paris") return str.includes("+2") ? "CEST" : "CET";
  if(tz==="Australia/Brisbane") return "AEST";
  if(tz==="America/New_York") return str.includes("-4") ? "EDT" : "EST";
  if(tz==="America/Chicago") return str.includes("-5") ? "CDT" : "CST";
  if(tz==="America/Denver") return str.includes("-6") ? "MDT" : "MST";
  if(tz==="America/Los_Angeles") return str.includes("-7") ? "PDT" : "PST";
}

function formatTime(h,m,tz){
  if(tz.startsWith("America")){
    let suffix = h>=12?"pm":"am";
    let hr = h%12 || 12;
    return hr+suffix;
  }
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function getTimeParts(date, tz){
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: tz,
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(date);

  let h=0,m=0;
  parts.forEach(p=>{
    if(p.type==="hour") h=parseInt(p.value);
    if(p.type==="minute") m=parseInt(p.value);
  });

  return {h,m};
}

// ---------- outputs ----------

function generateHammertime(){
  const name = document.getElementById("eventName").value;
  const date = document.getElementById("startDate").value;
  const tz = document.getElementById("timezone").value;
  const rows = getRows();

  let [y,m,d]=date.split("-").map(Number);
  let prev=null, offset=0, out="", first=null;

  rows.forEach(r=>{
    if(prev!==null && r.h < prev) offset++;
    prev=r.h;

    const dt = makeUTCDate(y,m,d+offset,r.h,r.m,tz);
    const unix = Math.floor(dt/1000);

    if(!first) first=unix;

    out += `> [${r.name}](https://twitch.tv/${r.name}) - <t:${unix}:t>\n`;
  });

  document.getElementById("output").textContent =
    `🚂 ${name} - <t:${first}:R>\n` + out.trim();
}

function generateBot(){
  const name = document.getElementById("eventName").value;
  const date = document.getElementById("startDate").value;
  const tz = document.getElementById("timezone").value;
  const rows = getRows();

  let [y,m,d]=date.split("-").map(Number);
  const eventDate = new Date(y,m-1,d);

  let regions=[];
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(c=>regions.push(c.value));

  let out="";

  regions.forEach(region=>{
    let line = `🚂 ${name} (${getLabel(region,eventDate)}):`;

    rows.forEach(r=>{
      const dt = makeUTCDate(y,m,d,r.h,r.m,tz);
      const {h,m:mi} = getTimeParts(dt, region);

      line += ` 🚃 ${formatTime(h,mi,region)} @${r.name}`;
    });

    out += "`"+line+"`\n\n";
  });

  document.getElementById("botOutput").textContent = out.trim();
}

function copyBot(){
  navigator.clipboard.writeText(document.getElementById("botOutput").textContent);
}

function copyHammertime(){
  navigator.clipboard.writeText(document.getElementById("output").textContent);
}

</script>

</body>
</html>
